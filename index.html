<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yeah That my Ride</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#E8D8C4;
    font-family:'Patrick Hand', cursive;
    min-height:100vh;
    overflow-x:hidden;
    overflow-y:auto;
}

.board{

    position:relative;

    width:min(1000px,95vw);

    aspect-ratio:1000/1050;

}

/* ---------------- PHOTO ---------------- */

.image{
    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%) rotate(-6deg);

    width:39%;
    aspect-ratio:390/510;

    background:white;

    border:clamp(6px,.75vw,12px) solid white;
    border-bottom:clamp(30px,3vw,60px) solid white;

    border-radius:clamp(4px,.8vw,8px);

    box-shadow:0 1.8vw 3.5vw rgba(0,0,0,.12);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:1;
}

.kind{

    

    left:-13%;

    top:2%;

}

.eyes{

    

    right:-15%;
    top:3%;

}

.gorgeous{

    

    left:-14%;
    bottom:-6%;

}

.fav{

    

    right:-20%;
    bottom:-5%;

}

/* ---------------- NOTES ---------------- */

.note{
    position:absolute;
    display:flex;
    align-items:center;
    gap:clamp(8px,1.5vw,18px);

    z-index:2;
}

.text{

    z-index:5;

    background:#FFF7ED;

    padding:clamp(5px,.7vw,8px)
        clamp(10px,1.3vw,16px);

    border-radius:clamp(8px,1.2vw,15px);

    box-shadow:0 .8vw 1.8vw rgba(0,0,0,.12);

    font-size:clamp(12px,1.2vw,18px);

    color:#5D4037;
}

/* Arrow */

.line{

    position:relative;

    width:clamp(45px,7vw,90px);
    height:clamp(2px,.3vw,3px);

    background:#6D4C41;

}

.line::after{

    content:"";

    position:absolute;

    right:-1%;
    top:50%;

    width:clamp(10px,1.8vw,18px);
    height:clamp(10px,1.8vw,18px);

    border-top:clamp(2px,.3vw,3px) solid #6D4C41;
    border-right:clamp(2px,.3vw,3px) solid #6D4C41;

    transform:translateY(-50%) rotate(45deg);

}

/* Reverse Arrow */

.reverse{

    transform:rotate(180deg);

}

/* ---------------- POSITIONS ---------------- */

.left{
    left:7%;
    top:50%;
    transform:translateY(-50%) rotate(-5deg);
}

.right{
    right:7%;
    top:50%;
    transform:translateY(-50%) rotate(4deg);
}

.top{

    left:50%;
    top:-2%;

    transform:translateX(-50%) rotate(-4deg);

    flex-direction:column;

}

.top .line{

    width:0.3%;
    height:11%;

}

.top .line::after{

    top:auto;
    bottom:-2%;

    left:50%;

    transform:translateX(-50%) rotate(135deg);

}

.bottom{

    left:50%;
    bottom:-2%;

    transform:translateX(-50%) rotate(4deg);

    flex-direction:column-reverse;

}

.bottom .line{

    width:0.3%;
    height:11%;

}

.bottom .line::after{

    top:-15px;
    left:50%;

    transform:translateX(-50%) rotate(-45deg);

}

/* Diagonals */

.topleft{
    left:-1%;
    top:9%;
}

.topright{
    left:75%;
    top:12%;
}

.bottomleft{
    left:10%;
    top:60%;
}

.bottomright{
    left:80%;
    top:61%;
}

/* ---------------- DOODLES ---------------- */

.doodle{

    position:absolute;

    font-size:clamp(24px,2.5vw,38px);

    color:#A06A48;

    opacity:.85;

}

.heart1{

    left:7%;
    top:18%;

}

.heart2{

    right:12%;
    bottom:15%;

}

.star1{

    left:84%;
    top:9%;

}

.star2{

    left:10%;
    bottom:18%;

}

.flower{

    left:49%;
    top:17%;

}

.image img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:clamp(1px,.2vw,2px);
}

.tape3{
    bottom:-3.5%;
    left:6%;
    transform:rotate(10deg);
}

.tape4{
    bottom:-3.5%;
    right:6%;
    transform:rotate(-10deg);
}

.overlay{

    position:absolute;

    z-index:6;

    background:none;

    box-shadow:none;

    padding:0;

    font-size:clamp(14px,1.5vw,22px);

    color:#5D4037;

    text-shadow:0 .1vw .2vw rgba(255,255,255,.5);
}

.bottom-note{

    position:absolute;

    left:50%;

    bottom:-36%;

    transform:translateX(-50%);

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:clamp(8px,1vw,15px);

}

.bottom-note .line{

    width:clamp(2px,.3vw,3px);
    height:clamp(50px,7vw,80px);

    position:relative;

    background:#6D4C41;

}

.bottom-note .line::after{

    content:"";

    position:absolute;

    top:0%;
    left:50%;

    width:clamp(10px,1.8vw,18px);
    height:clamp(10px,1.8vw,18px);

    border-top:clamp(2px,.3vw,3px) solid #6D4C41;
    border-right:clamp(2px,.3vw,3px) solid #6D4C41;

    transform:translateX(-50%) rotate(-45deg);

}

.polaroid{

}

.center{

    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    min-height:100vh;

}

</style>
</head>

                <div class="note left">

                <div class="note right">

</body>
</html>
