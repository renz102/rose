<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yeah That my Ride</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#E8D8C4;
    font-family:'Patrick Hand', cursive;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.board{
    position:relative;
    width:1000px;
    height:750px;
}

/* ---------------- PHOTO ---------------- */

.image{
    position:absolute;

    left:50%;
    top:43%;

    transform:translate(-50%,-50%) rotate(-6deg);

    width:390px;
    height:510px;

    background:white;

    border:12px solid white;
    border-bottom:60px solid white;

    border-radius:8px;

    box-shadow:0 18px 35px rgba(0,0,0,.18);

    display:flex;
    justify-content:center;
    align-items:center;

    color:#8D6E63;
    font-size:28px;

    z-index:1;
}

/* Tape */

.tape{
    position:absolute;

    width:65px;
    height:18px;

    background:rgba(255,255,255,.55);

    border-radius:4px;

    box-shadow:0 2px 5px rgba(0,0,0,.08);
}

.tape1{
    top:-12px;
    left:35px;
    transform:rotate(-20deg);
}

.tape2{
    top:-12px;
    right:35px;
    transform:rotate(20deg);
}

/* ---------------- NOTES ---------------- */

.note{

    position:absolute;

    display:flex;
    align-items:center;

    gap:18px;
}

.text{

    z-index:5;

    background:#FFF7ED;

    padding:8px 16px;

    border-radius:15px;

    box-shadow:0 8px 18px rgba(0,0,0,.12);

    font-size:18px;

    color:#5D4037;
}

/* Arrow */

.line{

    position:relative;

    width:160px;
    height:3px;

    background:#6D4C41;

}

.line::after{

    content:"";

    position:absolute;

    right:-1px;
    top:50%;

    width:18px;
    height:18px;

    border-top:3px solid #6D4C41;
    border-right:3px solid #6D4C41;

    transform:translateY(-50%) rotate(45deg);

}

/* Reverse Arrow */

.reverse{

    transform:rotate(180deg);

}

/* ---------------- POSITIONS ---------------- */

.left{

    left:-30px;
    top:50%;
    transform:translateY(-50%) rotate(-5deg);

}

.right{

    right:-30px;
    top:50%;
    transform:translateY(-50%) rotate(4deg);

}

.top{

    left:50%;
    top:-20px;

    transform:translateX(-50%) rotate(-4deg);

    flex-direction:column;

}

.top .line{

    width:3px;
    height:120px;

}

.top .line::after{

    top:auto;
    bottom:-2px;

    left:50%;

    transform:translateX(-50%) rotate(135deg);

}

.bottom{

    left:50%;
    bottom:-20px;

    transform:translateX(-50%) rotate(4deg);

    flex-direction:column-reverse;

}

.bottom .line{

    width:3px;
    height:120px;

}

.bottom .line::after{

    top:-15px;
    left:50%;

    transform:translateX(-50%) rotate(-45deg);

}

/* Diagonals */

.topleft{
    left:-10px;
    top:92px;
    transform:rotate(-8deg);
}

.topright{
    left:750px;
    top:120px;
    transform:rotate(8deg);
}

.bottomleft{
    left:100px;
    top:600px;
    transform:rotate(-6deg);
}

.bottomright{
    left:800px;
    top:615px;
    transform:rotate(7deg);
}

/* ---------------- DOODLES ---------------- */

.doodle{

    position:absolute;

    font-size:38px;

    color:#A06A48;

    opacity:.85;

}

.heart1{

    left:70px;
    top:180px;

}

.heart2{

    right:120px;
    bottom:150px;

}

.star1{

    left:840px;
    top:90px;

}

.star2{

    left:100px;
    bottom:180px;

}

.flower{

    left:490px;
    top:170px;

}

.image img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:2px;
}

.tape3{
    bottom:-35px;
    left:25px;
    transform:rotate(10deg);
}

.tape4{
    bottom:-35px;
    right:25px;
    transform:rotate(-10deg);
}

.overlay{

    position:absolute;

    z-index:6;

    background:none;

    box-shadow:none;

    padding:0;

    font-size:22px;

    color:#5D4037;

    text-shadow:0 1px 2px rgba(255,255,255,.5);
}

</style>
</head>

<body>

<div class="board">

<div class="image">

    <img src="rose.jpg" alt="Her">

    <div class="tape tape1"></div>
    <div class="tape tape2"></div>
    <div class="tape tape3"></div>
    <div class="tape tape4"></div>

</div>

<!-- LEFT -->

<div class="note left">

    <div class="text">
        Yeah this my girl ♡
    </div>

    <div class="line"></div>

</div>

<!-- RIGHT -->

<div class="note right">

    <div class="line reverse"></div>

    <div class="text">
        Literally perfect
    </div>

</div>

<!-- TOP -->

<!-- BOTTOM -->

<div class="note bottom">

    <div class="text">
        MY CUTIEEE 🌹
    </div>

    <div class="line reverse"></div>

</div>

<!-- CORNERS -->

<div class="overlay topleft">
Kind heart ♡
</div>

<div class="overlay topright">
Pretty eyes ✦
</div>

<div class="overlay bottomleft">
Gorgeous :)
</div>

<div class="overlay bottomright">
My favorite person ♡
</div>

<!-- DOODLES -->

<div class="doodle heart1">♡</div>

<div class="doodle heart2">♡</div>

<div class="doodle star1">✦</div>

<div class="doodle star2">✦</div>

<div class="doodle flower">❀</div>

</div>

</body>
</html>
